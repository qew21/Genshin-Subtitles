name: Build Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  SOLUTION_FILE: GI-Subtitles.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  BASE_VERSION: 1.6.3
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2
        with:
          nuget-version: 6.x

      - name: Validate release version
        shell: pwsh
        run: |
          $tagVersion = $env:RELEASE_TAG.TrimStart('v')
          $assemblyInfo = Get-Content "GI-Subtitles/Properties/AssemblyInfo.cs" -Raw
          if ($assemblyInfo -notmatch 'AssemblyVersion\("([0-9.]+)"\)') {
            throw "AssemblyVersion was not found."
          }
          $assemblyVersion = [Version]$Matches[1]
          $requestedVersion = [Version]$tagVersion
          if ($assemblyVersion.ToString(3) -ne $requestedVersion.ToString(3)) {
            throw "Tag version $requestedVersion does not match AssemblyVersion $assemblyVersion."
          }

      - name: Restore packages
        run: |
          nuget restore ${{ env.SOLUTION_FILE }}
          dotnet restore "WixSharp Setup/WixSharp Setup.csproj"

      - name: Build application and tests
        run: |
          msbuild ${{ env.SOLUTION_FILE }} -t:GI-Subtitles:Rebuild -p:Configuration=${{ env.BUILD_CONFIGURATION }} -p:Platform=${{ env.BUILD_PLATFORM }}
          msbuild ${{ env.SOLUTION_FILE }} -t:GI-Test:Rebuild -p:Configuration=${{ env.BUILD_CONFIGURATION }} -p:Platform=${{ env.BUILD_PLATFORM }}

      - name: Run unit tests
        run: dotnet vstest GI-Test/bin/Release/GI-Test.dll /Tests:MissingTargetConfig_CreatesFreshConfigInsteadOfReusingPreviousGame /logger:trx /ResultsDirectory:test-results

      - name: Download base release
        shell: pwsh
        run: |
          $baseZip = "${{ env.BASE_VERSION }}.zip"
          $baseUri = "https://github.com/qew21/Genshin-Subtitles/releases/download/${{ env.BASE_VERSION }}/$baseZip"
          Invoke-WebRequest -Uri $baseUri -OutFile $baseZip -UseBasicParsing
          Expand-Archive -Path $baseZip -DestinationPath base-release -Force

      - name: Assemble release directory
        shell: pwsh
        run: |
          $releaseDir = "release-package"
          $buildDir = "GI-Subtitles/bin/Release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Copy-Item -Path "base-release/*" -Destination $releaseDir -Recurse -Force

          Copy-Item -Path "$buildDir/GI-Subtitles.exe" -Destination $releaseDir -Force
          Copy-Item -Path "$buildDir/GI-Subtitles.exe.config" -Destination $releaseDir -Force
          $preserveFromBase = @(
            "onnxruntime.dll",
            "opencv_videoio_ffmpeg4110_64.dll",
            "OpenCvSharp4.runtime.dll",
            "Microsoft.ML.OnnxRuntime.dll",
            "Microsoft.ML.OnnxRuntime.Managed.dll",
            "Microsoft.ML.OnnxRuntime.CSharp.dll"
          )
          Get-ChildItem -Path $buildDir -Filter "*.dll" | ForEach-Object {
            if ($preserveFromBase -notcontains $_.Name) {
              Copy-Item -Path $_.FullName -Destination $releaseDir -Force
            }
          }

          $required = @(
            "GI-Subtitles.exe",
            "Config.json",
            "inference",
            "x64",
            "onnxruntime.dll",
            "opencv_videoio_ffmpeg4110_64.dll"
          )
          foreach ($item in $required) {
            if (-not (Test-Path (Join-Path $releaseDir $item))) {
              throw "Required release item is missing: $item"
            }
          }

      - name: Build MSI
        shell: pwsh
        run: |
          $installerFiles = "WixSharp Setup/bin/Files"
          New-Item -ItemType Directory -Force -Path $installerFiles | Out-Null
          Copy-Item -Path "release-package/*" -Destination $installerFiles -Recurse -Force
          dotnet build "WixSharp Setup/WixSharp Setup.csproj" --configuration Release --no-restore

          $msi = Get-Item "WixSharp Setup/GI-Subtitles.msi"
          if ($msi.Length -lt 1MB) {
            throw "Generated MSI is unexpectedly small: $($msi.Length) bytes"
          }
          Copy-Item $msi.FullName "GI-Subtitles-${env:RELEASE_TAG}.msi" -Force

      - name: Create ZIP and checksums
        shell: pwsh
        run: |
          Compress-Archive -Path "release-package/*" -DestinationPath "GI-Subtitles-${env:RELEASE_TAG}.zip" -Force
          Get-FileHash "GI-Subtitles-${env:RELEASE_TAG}.zip", "GI-Subtitles-${env:RELEASE_TAG}.msi" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content "GI-Subtitles-${env:RELEASE_TAG}-SHA256.txt"

      - name: Generate release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = ""

          # An annotated tag keeps the message entered with `git tag -a`.
          $tagType = git cat-file -t "refs/tags/${env:RELEASE_TAG}" 2>$null
          if ($LASTEXITCODE -eq 0 -and $tagType -eq "tag") {
            $notes = (git for-each-ref "refs/tags/${env:RELEASE_TAG}" --format="%(contents)") -join "`n"
            $notes = $notes.Trim()
          }

          # When a tag/release is created on github.com, its description is the
          # Release body rather than an annotated Git tag message.
          if ([string]::IsNullOrWhiteSpace($notes)) {
            # The tag push event can be queued just before the Release API has
            # finished publishing the new Release, so retry briefly.
            for ($attempt = 1; $attempt -le 5; $attempt++) {
              $existingNotes = gh api "repos/${{ github.repository }}/releases/tags/${env:RELEASE_TAG}" --jq .body 2>$null
              if ($LASTEXITCODE -eq 0) {
                $notes = ($existingNotes -join "`n").Trim()
                if (-not [string]::IsNullOrWhiteSpace($notes)) {
                  break
                }
              }
              if ($attempt -lt 5) {
                Start-Sleep -Seconds 3
              }
            }
          }

          # Lightweight tags without a description still get useful notes.
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $generatedNotes = gh api --method POST "repos/${{ github.repository }}/releases/generate-notes" `
              -f "tag_name=${env:RELEASE_TAG}" `
              -f "target_commitish=${{ github.sha }}" `
              --jq .body
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to generate release notes."
            }
            $notes = ($generatedNotes -join "`n").Trim()
          }

          Set-Content "github-release-notes.md" -Value $notes -Encoding utf8

      - name: Create website release manifest
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          $msiName = "GI-Subtitles-${env:RELEASE_TAG}.msi"
          $msi = Get-Item $msiName
          $manifest = [ordered]@{
            schemaVersion = 1
            version = $version
            publishedAt = (Get-Date).ToUniversalTime().ToString("o")
            channel = "stable"
            rollout = 0
            minimumVersion = $null
            releaseNotes = (Get-Content "github-release-notes.md" -Raw).Trim()
            assets = [ordered]@{
              "windows-x64-msi" = [ordered]@{
                url = "https://2langs.com/data/$msiName"
                sha256 = (Get-FileHash $msiName -Algorithm SHA256).Hash.ToLowerInvariant()
                size = $msi.Length
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content "release-manifest.json" -Encoding utf8

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GI-Subtitles-${{ github.ref_name }}
          path: |
            GI-Subtitles-${{ github.ref_name }}.zip
            GI-Subtitles-${{ github.ref_name }}.msi
            GI-Subtitles-${{ github.ref_name }}-SHA256.txt
            release-manifest.json
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: github-release-notes.md
          fail_on_unmatched_files: true
          files: |
            GI-Subtitles-${{ github.ref_name }}.zip
            GI-Subtitles-${{ github.ref_name }}.msi
            GI-Subtitles-${{ github.ref_name }}-SHA256.txt

  deploy-website:
    name: Deploy website downloads
    if: ${{ !contains(github.ref_name, '-') }}
    needs: release
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: GI-Subtitles-${{ github.ref_name }}
          path: release-artifacts

      - name: Upload installer and checksum
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          username: release-deploy
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: release-artifacts/GI-Subtitles-${{ github.ref_name }}.msi,release-artifacts/GI-Subtitles-${{ github.ref_name }}-SHA256.txt
          target: /srv/2langs/data
          strip_components: 1
          overwrite: true

      # Publish the manifest last so clients never see a release before its MSI exists.
      - name: Publish release manifest
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          username: release-deploy
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: release-artifacts/release-manifest.json
          target: /srv/2langs/data
          strip_components: 1
          overwrite: true
