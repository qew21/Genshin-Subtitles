name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ created ]

env:
  PROJECT_NAME: GI-Subtitles
  SOLUTION_FILE: GI-Subtitles.sln
  MAIN_PROJECT: GI-Subtitles
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: '6.x'

    - name: Restore NuGet Packages
      run: nuget restore ${{ env.SOLUTION_FILE }}

    - name: Build Main Application
      run: |
        msbuild ${{ env.SOLUTION_FILE }} -t:${{ env.MAIN_PROJECT }}:Rebuild -p:Configuration=${{ env.BUILD_CONFIGURATION }} -p:Platform=${{ env.BUILD_PLATFORM }}

    - name: Build GI-Test
      run: |
        msbuild ${{ env.SOLUTION_FILE }} -t:GI-Test:Rebuild -p:Configuration=${{ env.BUILD_CONFIGURATION }} -p:Platform=${{ env.BUILD_PLATFORM }}

    - name: Download Language Files for Tests
      run: |
        # Create data directory
        $dataDir = "$env:APPDATA\GI-Subtitles"
        New-Item -ItemType Directory -Force -Path $dataDir
        
        # Download Genshin language files
        $genshinDir = Join-Path $dataDir "Genshin"
        New-Item -ItemType Directory -Force -Path $genshinDir
        
        Write-Host "Downloading Genshin TextMap files..."
        Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/AnimeGameData/-/raw/master/TextMap/TextMapCHS.json?inline=false" -OutFile (Join-Path $genshinDir "TextMapCHS.json") -UseBasicParsing
        Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/AnimeGameData/-/raw/master/TextMap/TextMapEN.json?inline=false" -OutFile (Join-Path $genshinDir "TextMapEN.json") -UseBasicParsing
        Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/AnimeGameData/-/raw/master/TextMap/TextMapJP.json?inline=false" -OutFile (Join-Path $genshinDir "TextMapJP.json") -UseBasicParsing
        
        # Download StarRail language files
        $starRailDir = Join-Path $dataDir "StarRail"
        New-Item -ItemType Directory -Force -Path $starRailDir
        
        Write-Host "Downloading StarRail TextMap files..."
        Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/turnbasedgamedata/-/raw/main/TextMap/TextMapCHS.json?inline=false" -OutFile (Join-Path $starRailDir "TextMapCHS.json") -UseBasicParsing
        Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/turnbasedgamedata/-/raw/main/TextMap/TextMapEN.json?inline=false" -OutFile (Join-Path $starRailDir "TextMapEN.json") -UseBasicParsing
        
        Write-Host "Language files downloaded successfully"
        Get-ChildItem -Path $genshinDir | ForEach-Object { Write-Host "  Genshin: $($_.Name) - $([math]::Round($_.Length / 1KB, 2)) KB" }
        Get-ChildItem -Path $starRailDir | ForEach-Object { Write-Host "  StarRail: $($_.Name) - $([math]::Round($_.Length / 1KB, 2)) KB" }
      shell: pwsh

    - name: Run Unit Tests
      run: |
        Write-Host "=== Running Unit Tests ==="
        $testAssemblies = Get-ChildItem -Recurse -Filter "GI-Test.dll" | Where-Object { $_.FullName -match "bin\\" }
        if ($testAssemblies) {
          foreach ($test in $testAssemblies) {
            Write-Host "Running tests in: $($test.FullName)"
            # Run tests and capture output
            $testOutput = vstest.console.exe $test.FullName /logger:trx /logger:console 2>&1
            Write-Host $testOutput
            
            # Print test result files
            Write-Host "`n=== Test Result Files ==="
            Get-ChildItem -Path . -Filter "*.json" -Recurse | Where-Object { $_.Name -like "*TestResult*" -or $_.Name -eq "result.json" } | ForEach-Object {
              Write-Host "`n--- $($_.FullName) ---"
              Get-Content $_.FullName | Write-Host
            }
          }
        } else {
          Write-Host "No test assemblies found"
        }
      shell: pwsh
      continue-on-error: true

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Test-Results
        path: |
          **/*.trx
          **/result.json
          **/*TestResult*.json
        retention-days: 30

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-Build
        path: |
          GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*.exe
          GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*.dll
          GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*.pdb
          GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*.config
        retention-days: 30

  release:
    name: Create Release Package
    needs: build
    if: github.event_name == 'release'
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Base Release
      run: |
        $baseZip = "1.6.4pre.zip"
        $baseUri = "https://github.com/qew21/Genshin-Subtitles/releases/download/1.6.4/$baseZip"
        Write-Host "Downloading base version from: $baseUri"
        Invoke-WebRequest -Uri $baseUri -OutFile $baseZip -UseBasicParsing
        Write-Host "Downloaded: $baseZip"
        
        $baseDir = "base-release"
        New-Item -ItemType Directory -Force -Path $baseDir
        Expand-Archive -Path $baseZip -DestinationPath $baseDir -Force
        Write-Host "Extracted base release to: $baseDir"
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: '6.x'

    - name: Restore NuGet Packages
      run: nuget restore ${{ env.SOLUTION_FILE }}

    - name: Build Release
      run: |
        msbuild ${{ env.SOLUTION_FILE }} -t:${{ env.MAIN_PROJECT }}:Rebuild -p:Configuration=${{ env.BUILD_CONFIGURATION }} -p:Platform=${{ env.BUILD_PLATFORM }}

    - name: Merge with Base Release
      run: |
        $releaseDir = "release-package"
        New-Item -ItemType Directory -Force -Path $releaseDir
        
        Copy-Item -Path "base-release/**/*" -Destination $releaseDir -Recurse -Force
        
        $newBuildPath = "GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}"
        Write-Host "Copying new build from: $newBuildPath"
        
        Copy-Item -Path "$newBuildPath/GI-Subtitles.exe" -Destination "$releaseDir/GI-Subtitles.exe" -Force
        Copy-Item -Path "$newBuildPath/GI-Subtitles.pdb" -Destination "$releaseDir/GI-Subtitles.pdb" -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "$newBuildPath/GI-Subtitles.exe.config" -Destination "$releaseDir/GI-Subtitles.exe.config" -Force -ErrorAction SilentlyContinue
        
        Get-ChildItem -Path "$newBuildPath" -Filter "*.dll" | ForEach-Object {
          Copy-Item -Path $_.FullName -Destination "$releaseDir/$($_.Name)" -Force -ErrorAction SilentlyContinue
        }
        
        Write-Host "Release package contents:"
        Get-ChildItem -Path $releaseDir | ForEach-Object { Write-Host "  - $($_.Name)" }
      shell: pwsh

    - name: Create Release Package
      run: |
        Compress-Archive -Path "release-package/*" -DestinationPath "${{ env.PROJECT_NAME }}-${{ github.event.release.tag_name }}.zip" -Force
        Write-Host "Created package: ${{ env.PROJECT_NAME }}-${{ github.event.release.tag_name }}.zip"
        $size = (Get-Item "${{ env.PROJECT_NAME }}-${{ github.event.release.tag_name }}.zip").Length / 1KB
        Write-Host "Package size: $([math]::Round($size, 2)) KB"
      shell: pwsh

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.PROJECT_NAME }}-*.zip
        body: |
          ## 🚀 自动构建发布
          
          **Commit**: ${{ github.sha }}
          **构建时间**: ${{ github.event.release.created_at }}
          **版本**: ${{ github.event.release.tag_name }}
          
          ### 📦 包含内容
          - 主程序可执行文件 (GI-Subtitles.exe)
          - PaddleOCRSharp 引擎
          - 依赖库文件
          - 语言包文件
          
          ### 📝 更新说明
          ${{ github.event.release.body }}
          
          ---
          🤖 此发布由 GitHub Actions 自动构建
          ℹ️ MSI 安装程序需手动构建
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  installer:
    name: Build MSI Installer (Optional)
    needs: build
    if: false
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: '6.x'

    - name: Restore NuGet Packages
      run: nuget restore ${{ env.SOLUTION_FILE }}

    - name: Build Main Application
      run: |
        msbuild ${{ env.SOLUTION_FILE }} -t:${{ env.MAIN_PROJECT }}:Rebuild -p:Configuration=${{ env.BUILD_CONFIGURATION }} -p:Platform=${{ env.BUILD_PLATFORM }}

    - name: Copy Output to WixSharp
      run: |
        $wixFilesDir = "WixSharp Setup/bin/Files"
        New-Item -ItemType Directory -Force -Path $wixFilesDir
        Copy-Item -Path "GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*" -Destination $wixFilesDir -Recurse -Force
      shell: pwsh

    - name: Build MSI
      run: |
        msbuild ${{ env.SOLUTION_FILE }} -t:"WixSharp Setup":Rebuild -p:Configuration=${{ env.BUILD_CONFIGURATION }} -p:Platform=${{ env.BUILD_PLATFORM }}
      continue-on-error: true
