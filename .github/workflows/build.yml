name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ created ]

env:
  PROJECT_NAME: GI-Subtitles
  MAIN_PROJECT: GI-Subtitles/GI-Subtitles.csproj
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: Build WPF Application
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: '6.x'

    - name: Restore NuGet Packages
      run: nuget restore GI-Subtitles.sln

    - name: Build Main Application (Exclude WixSharp Setup)
      run: |
        # Build only the main application, skip WixSharp Setup (requires installer tools)
        msbuild ${{ env.MAIN_PROJECT }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform="Any CPU" /restore /t:Build
        msbuild GI-Test/GI-Test.csproj /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform="Any CPU" /restore /t:Build
      continue-on-error: false

    - name: Run Unit Tests
      run: |
        $testAssemblies = Get-ChildItem -Recurse -Filter "GI-Test.dll" | Where-Object { $_.FullName -match "bin\\" }
        if ($testAssemblies) {
          foreach ($test in $testAssemblies) {
            Write-Host "Running tests in: $($test.FullName)"
            vstest.console.exe $test.FullName /logger:trx /logger:console
          }
        } else {
          Write-Host "No test assemblies found"
        }
      continue-on-error: true

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-Build
        path: |
          GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*.exe
          GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*.dll
          GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*.pdb
          GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*.config
        retention-days: 30

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'release'
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: '6.x'

    - name: Restore NuGet Packages
      run: nuget restore GI-Subtitles.sln

    - name: Build Release
      run: |
        msbuild ${{ env.MAIN_PROJECT }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform="Any CPU" /restore /t:Build

    - name: Create Release Package
      run: |
        $releaseDir = "release-package"
        New-Item -ItemType Directory -Force -Path $releaseDir
        # Copy main application files
        Copy-Item -Path "GI-Subtitles/bin/${{ env.BUILD_CONFIGURATION }}/**/*" -Destination $releaseDir -Recurse -Force
        # Create ZIP package
        Compress-Archive -Path "$releaseDir/*" -DestinationPath "${{ env.PROJECT_NAME }}-${{ github.event.release.tag_name }}.zip" -Force
        Write-Host "Created package: ${{ env.PROJECT_NAME }}-${{ github.event.release.tag_name }}.zip"
        Get-ChildItem -Path . -Filter "*.zip" | ForEach-Object { Write-Host "Package: $($_.Name) - Size: $($_.Length / 1KB) KB" }
      shell: pwsh

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.PROJECT_NAME }}-*.zip
        body: |
          ## 🚀 自动构建发布
          **Commit**: ${{ github.sha }}
          **构建时间**: ${{ github.event.release.created_at }}
          ### 📦 包含内容
          - 主程序可执行文件 (GI-Subtitles.exe)
          - 依赖库文件
          - PaddleOCRSharp 引擎
          - 语言包文件
          ### ⚠️ 注意
          - WixSharp 安装程序需要手动构建
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-quality:
    name: Code Quality Check
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Run Code Analysis
      run: |
        msbuild ${{ env.MAIN_PROJECT }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:RunCodeAnalysis=true /restore /t:Build
      continue-on-error: true
