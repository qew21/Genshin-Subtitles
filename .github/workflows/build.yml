name: Build and Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

env:
  SOLUTION_FILE: GI-Subtitles.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  BASE_VERSION: 1.6.3

jobs:
  build-and-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2
        with:
          nuget-version: 6.x

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_FILE }}

      - name: Build application
        run: msbuild ${{ env.SOLUTION_FILE }} -t:GI-Subtitles:Rebuild -p:Configuration=${{ env.BUILD_CONFIGURATION }} -p:Platform=${{ env.BUILD_PLATFORM }}

      - name: Build tests
        run: msbuild ${{ env.SOLUTION_FILE }} -t:GI-Test:Rebuild -p:Configuration=${{ env.BUILD_CONFIGURATION }} -p:Platform=${{ env.BUILD_PLATFORM }}

      - name: Download test data
        shell: pwsh
        run: |
          $baseZip = "${{ env.BASE_VERSION }}.zip"
          $baseUri = "https://github.com/qew21/Genshin-Subtitles/releases/download/${{ env.BASE_VERSION }}/$baseZip"
          Invoke-WebRequest -Uri $baseUri -OutFile $baseZip -UseBasicParsing
          Expand-Archive -Path $baseZip -DestinationPath temp_extract -Force
          New-Item -ItemType Directory -Force -Path "GI-Test/bin/Release/inference" | Out-Null
          Copy-Item -Path "temp_extract/inference/*" -Destination "GI-Test/bin/Release/inference" -Recurse -Force

          $dataDir = "$env:APPDATA/GI-Subtitles"
          New-Item -ItemType Directory -Force -Path "$dataDir/Genshin", "$dataDir/StarRail" | Out-Null
          Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/animegamedata2/-/raw/main/TextMap/TextMapCHS.json?inline=false" -OutFile "$dataDir/Genshin/TextMapCHS.json" -UseBasicParsing
          Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/animegamedata2/-/raw/main/TextMap/TextMapEN.json?inline=false" -OutFile "$dataDir/Genshin/TextMapEN.json" -UseBasicParsing
          Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/animegamedata2/-/raw/main/TextMap/TextMapJP.json?inline=false" -OutFile "$dataDir/Genshin/TextMapJP.json" -UseBasicParsing
          Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/turnbasedgamedata/-/raw/main/TextMap/TextMapCHS.json?inline=false" -OutFile "$dataDir/StarRail/TextMapCHS.json" -UseBasicParsing
          Invoke-WebRequest -Uri "https://gitlab.com/Dimbreath/turnbasedgamedata/-/raw/main/TextMap/TextMapEN.json?inline=false" -OutFile "$dataDir/StarRail/TextMapEN.json" -UseBasicParsing

      - name: Run tests
        run: dotnet vstest GI-Test/bin/Release/GI-Test.dll /logger:trx /ResultsDirectory:test-results
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Results
          path: test-results/*.trx
          retention-days: 14
          if-no-files-found: warn
